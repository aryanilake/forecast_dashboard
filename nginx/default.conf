upstream backend {
    server backend:5000;
}

# Cache settings
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=metar_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80 default_server;
    server_name _;

    # Performance settings
    client_max_body_size 100M;
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Static files - cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve frontend (React/static build)
    location = /login {
        root /usr/share/nginx/html;
        try_files /login.html =404;
    }

# Serve signup explicitly
    location = /signup {
        root /usr/share/nginx/html;
        try_files /signup.html =404;
    }

# Serve static HTML files normally
    location ~* \.html$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /admin {
        root /usr/share/nginx/html;
        try_files /admin.html =404;
    }

    location = /superadmin {
        root /usr/share/nginx/html;
        try_files /superadmin.html =404;
    }

# Default frontend (SPA fallback only for index)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }


    # Proxy API routes (/api)
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Cookie $http_cookie;
        
        # Timeouts for long-running requests (METAR fetching)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Cache specific endpoints
        proxy_cache metar_cache;
        proxy_cache_valid 200 60m;
        proxy_cache_key "$request_method$request_uri";
        proxy_cache_use_stale error timeout invalid_header updating;
        
        # Don't cache POST requests
        proxy_no_cache $request_method;
    }

    # Proxy authentication routes
    location /auth/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        proxy_set_header Cookie $http_cookie;
        # Don't cache auth requests
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Proxy web routes
    location /web/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Health check endpoint for Docker
    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
