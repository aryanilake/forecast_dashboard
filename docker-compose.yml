
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: aryanilake/metar-backend:latest
    container_name: metar_backend
    ports:
    - "5000:5000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - OGIMET_TIMEOUT=120
      - OGIMET_RETRIES=3
      - OGIMET_CACHE_ENABLED=true
      - OGIMET_CACHE_TTL=3600
      - JWT_SECRET=38a829cafee2e469ae7b9fbad1a52f709340132b4dafd443421d107acad2eaad

    volumes:
      - ./app/data:/app/data
      - ./app/backend/logs:/app/logs
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  nginx:
    image: nginx:alpine
    container_name: metar_nginx
    restart: unless-stopped
    ports:
      # - "0.0.0.0:8080:80"
      - "8080:80"
    volumes:
      - ./app/frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
