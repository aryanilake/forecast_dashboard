<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <script src="/js/tailwind.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js" defer></script>
  <style>
    .header {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: nowrap;
    }
    .header-left {
      min-width: 0;
      flex: 1 1 auto;
    }
    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-image {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }
    .header-text h1 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      color: #1d4ed8;
      line-height: 1.2;
    }
    .header-text p {
      margin: 2px 0 0;
      font-size: 0.82rem;
      color: #475569;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      flex-wrap: nowrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }
    .user-log-header {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid #dbeafe;
      background: #eff6ff;
      color: #1e40af;
      font-weight: 600;
      font-size: 0.88rem;
      transition: all 0.2s ease;
    }
    .user-log-header:hover {
      background: #dbeafe;
    }
    .user-profile-wrapper {
      position: relative;
    }
    .user-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      min-width: 176px;
    }
    .profile-avatar,
    .dropdown-avatar {
      width: 34px;
      height: 34px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #ffffff;
      background: #2563eb;
    }
    .profile-info {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
      min-width: 0;
    }
    .profile-name {
      font-size: 0.86rem;
      font-weight: 700;
      color: #1f2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 98px;
    }
    .profile-role {
      font-size: 0.72rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      font-weight: 600;
    }
    .dropdown-icon {
      color: #64748b;
      margin-left: auto;
      display: flex;
      align-items: center;
    }
    .profile-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: 240px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(2, 8, 23, 0.12);
      z-index: 50;
      padding: 8px 0;
    }
    .dropdown-header {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dropdown-name {
      margin: 0;
      color: #111827;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .dropdown-role {
      margin: 2px 0 0;
      color: #64748b;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      font-weight: 600;
    }
    .dropdown-divider {
      height: 1px;
      background: #e5e7eb;
      margin: 8px 0;
    }
    .dropdown-item {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 10px 12px;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.86rem;
    }
    .dropdown-item:hover {
      background: #f8fafc;
    }
    .logout-btn {
      color: #dc2626;
    }
    @media (max-width: 768px) {
      .header {
        padding: 12px 14px;
      }
      .header-right {
        gap: 8px;
      }
      .profile-dropdown {
        width: min(92vw, 300px);
      }
    }
    @media (max-width: 540px) {
      .log-text {
        display: none;
      }
      .user-log-header {
        flex: 0 0 auto;
        padding: 8px 10px;
      }
      .logo-image {
        width: 44px;
        height: 44px;
      }
      .header-text h1 {
        font-size: 1.06rem;
      }
      .header-text p {
        font-size: 0.72rem;
      }
      .user-profile {
        min-width: 148px;
        padding: 7px 8px;
      }
      .profile-name {
        max-width: 72px;
      }
    }
  </style>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<header class="header">
  <div class="header-left">
    <div class="logo-section">
      <img src="https://mausam.imd.gov.in/responsive/img/logo/imd_logo_a.png" alt="MWO Logo" class="logo-image">
      <div class="header-text">
        <h1>MWO Mumbai</h1>
        <p>Admin Dashboard</p>
      </div>
    </div>
  </div>

  <div class="header-right">
    <button class="user-log-header" id="headerLogsBtn" title="View user logs" onclick="window.location.href='/admin_logs.html'">
      <svg class="log-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      <span class="log-text">User Logs</span>
    </button>

    <div class="user-profile-wrapper">
      <div class="user-profile" id="profileToggle">
        <div id="userAvatar" class="profile-avatar">A</div>
        <div class="profile-info">
          <span id="userInfo" class="profile-name">Admin</span>
          <span class="profile-role">Admin</span>
        </div>
        <span class="dropdown-icon" aria-hidden="true">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </span>
      </div>

      <div class="profile-dropdown hidden" id="profileDropdown">
        <div class="dropdown-header">
          <div id="dropdownAvatar" class="dropdown-avatar">A</div>
          <div class="dropdown-info">
            <p id="userInfoDropdown" class="dropdown-name">Admin</p>
            <p class="dropdown-role">Admin Account</p>
          </div>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" id="profileChangePassword">
          <i class="fas fa-key"></i>
          <span>Change Password</span>
        </button>
        <button class="dropdown-item logout-btn" id="profileLogout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </div>
</header>

<main class="p-4 sm:p-6 max-w-7xl mx-auto w-full space-y-6 flex-1">
  <!-- Users Section -->
  <div class="bg-white rounded-lg shadow-md p-6">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-4">
      <h2 class="text-xl font-semibold text-gray-800">Users Management</h2>
      <div class="flex flex-wrap gap-3">
        <!-- <a href="/admin_logs.html" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-md text-sm font-medium flex items-center justify-center gap-2">
          <i class="fas fa-clipboard-list"></i>View Logs
        </a> -->
        <button id="addUserBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium flex items-center justify-center gap-2">
          <i class="fas fa-plus"></i>Add User
        </button>
      </div>
    </div>
    
    <div id="userList" class="space-y-3">
      <div class="flex items-center justify-center py-8">
        <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600 mr-2"></div>
        <p class="text-gray-500">Loading users...</p>
      </div>
    </div>
  </div>

  <!-- Add/Edit User Modal -->
  <div id="addUserModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg p-6 max-w-md w-full shadow-xl">
      <h3 class="text-lg font-bold mb-4">Add New User</h3>
      <form id="addUserForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="newUsername" placeholder="Username" class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Station Code (optional)</label>
          <input type="text" id="newStation" placeholder="Station code (e.g. VABB)" class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
        </div>
        <div class="flex gap-2 justify-end pt-2">
          <button type="button" id="closeAddUserModal" class="px-4 py-2 text-gray-700 border border-gray-300 rounded-md hover:bg-gray-100 font-medium">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 font-medium">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Alert Messages -->
  <div id="alertBox" class="hidden fixed top-4 right-4 p-4 rounded-md shadow-md text-white max-w-sm z-40" style="animation: slideIn 0.3s ease-in-out;"></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-6 w-full mt-auto">
        <div class="container mx-auto px-4 max-w-7xl text-center">
            <p>© 2025 Forecast verification Dashboard. All rights reserved.</p>
        </div>
    </footer>
<script>
  // Defer admin page initialization until authManager.ready completes
  if (window.authManager && window.authManager.ready) {
    window.authManager.ready.then(() => {
      authManager.requireRole('admin');

      // Populate profile UI
      if (authManager.user) {
        document.getElementById('userAvatar').textContent = authManager.user.username.charAt(0).toUpperCase();
        document.getElementById('dropdownAvatar').textContent = authManager.user.username.charAt(0).toUpperCase();
        document.getElementById('userInfo').textContent = authManager.user.username;
        document.getElementById('userInfoDropdown').textContent = authManager.user.username;
      }

      // Profile menu toggle
      document.getElementById('profileToggle')?.addEventListener('click', (e) => {
        e.stopPropagation();
        const dd = document.getElementById('profileDropdown');
        dd.classList.toggle('hidden');
      });

      document.addEventListener('click', () => {
        const dd = document.getElementById('profileDropdown');
        if (dd && !dd.classList.contains('hidden')) dd.classList.add('hidden');
      });

      document.getElementById('profileChangePassword')?.addEventListener('click', async () => {
        const current = prompt('Enter current password');
        if (!current) return;
        const nw = prompt('Enter new password (min 6 chars)');
        if (!nw) return;
        try {
          const res = await fetch('/auth/change-password', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ current_password: current, new_password: nw })
          });
          const data = await res.json();
          if (res.ok) showAlert('Password changed successfully', 'success');
          else showAlert(data.error || 'Failed to change password', 'error');
        } catch (err) {
          showAlert('Network error', 'error');
        }
      });

      document.getElementById('profileLogout')?.addEventListener('click', async () => {
        await authManager.logout();
      });

      // Modal controls
      document.getElementById('addUserBtn')?.addEventListener('click', () => {
        document.getElementById('addUserModal').classList.remove('hidden');
        document.getElementById('addUserForm')?.reset();
      });

      document.getElementById('closeAddUserModal')?.addEventListener('click', () => {
        document.getElementById('addUserModal').classList.add('hidden');
      });

      // Handle form submission (calls /auth/signup as user)
      document.getElementById('addUserForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('newUsername').value.trim();
        const station = (document.getElementById('newStation').value || '').trim().toUpperCase();

        try {
          const res = await fetch('/auth/create-user', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, station_code: station })
          });

          const data = await res.json();
          if (res.ok) {
            showAlert('User created successfully! Default password: ' + (data.default_password || 'username@123'), 'success');
            document.getElementById('addUserModal').classList.add('hidden');
            if (window.loadUsers) loadUsers();
          } else {
            showAlert(data.error || 'Failed to create user', 'error');
          }
        } catch (err) {
          showAlert('Network error', 'error');
        }
      });

    }).catch(() => {
      // authManager handled redirects already
    });
  } else {
    // fallback: try to enforce role immediately
    try { authManager.requireRole('admin'); } catch {}
  }

  // Helper alert function (kept minimal)
  function showAlert(message, type) {
    const alertBox = document.getElementById('alertBox');
    if (alertBox) {
      alertBox.textContent = message;
      alertBox.className = `${type === 'success' ? 'bg-green-500' : 'bg-red-500'} fixed top-4 right-4 p-4 rounded-md shadow-md text-white max-w-sm z-40`;
      alertBox.classList.remove('hidden');
      setTimeout(() => alertBox.classList.add('hidden'), 3000);
    }
  }
</script>
</body>
</html>
